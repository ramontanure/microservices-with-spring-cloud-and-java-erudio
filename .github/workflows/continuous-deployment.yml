name: Microservices Continuous Deployment with Github Actions

on:
  push:
    branches:
      - "main"
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_ACCESS_TOKEN}}
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt' # See 'Supported distributions' for available options

      - name: Build Eureka Naming Server Docker Image
        working-directory: ./08_MicroservicesWithFeignAndEureka/naming-server
        run: mvn spring-boot:build-image -DskipTests

      - name: Build Api Gateway Docker Image
        working-directory: ./08_MicroservicesWithFeignAndEureka/api-gateway
        run: mvn spring-boot:build-image -DskipTests

      - name: Build Exchange Microservice Docker Image
        working-directory: ./08_MicroservicesWithFeignAndEureka/exchange-service
        run: mvn clean package -DskipTests

      - name: Build Book Microservice Docker Image
        working-directory: ./08_MicroservicesWithFeignAndEureka/book-service
        run: mvn clean package -DskipTests

      - name: Docker Compose Build
        working-directory: ./08_MicroservicesWithFeignAndEureka
        run: docker compose build